<form class="form-card form-stack" [formGroup]="userForm" (ngSubmit)="onSubmit()">
  <div>
    <label for="email">Email</label>
    <input id="email" type="email" formControlName="email" autocomplete="off" />

    @if (userForm.get('email')?.touched && userForm.get('email')?.invalid) {
      <small>Please enter a valid email address.</small>
    }
  </div>

  <div>
    <label for="password">Password</label>
    <input id="password" type="password" formControlName="password" autocomplete="new-password" />

    @if (userForm.get('password')?.touched && userForm.get('password')?.invalid) {
      <small>Password is required and must be at least 6 characters.</small>
    }
  </div>

  <div>
    <label for="role">Role</label>
    <select id="role" formControlName="role">
      @for (role of roles; track role.value) {
        <option [value]="role.value">{{ role.label }}</option>
      }
    </select>
  </div>

  <button type="submit" [disabled]="isSubmitting()">
    @if (isSubmitting()) {
      Creating user...
    } @else {
      Create User
    }
  </button>
</form>

@if (errorMessage()) {
  <p class="error-message">{{ errorMessage() }}</p>
}
