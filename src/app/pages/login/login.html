<section class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <h2>Login</h2>
    </div>

    <form class="form-stack" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div>
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="admin@test.com" />

        @if (loginForm.get('email')?.touched && loginForm.get('email')?.invalid) {
          <small>Please enter a valid email.</small>
        }
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Enter your password" />

        @if (loginForm.get('password')?.touched && loginForm.get('password')?.invalid) {
          <small>Password is required.</small>
        }
      </div>

      <button type="submit" [disabled]="isSubmitting">
        @if (isSubmitting) {
          Logging in...
        } @else {
          Login
        }
      </button>
    </form>

    @if (errorMessage) {
      <p class="error-message">{{ errorMessage }}</p>
    }

  </div>
</section>
